<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #1a0a2e 0%, #16213e 40%, #0f3460 70%, #533483 100%);
    font-family: 'Georgia', serif;
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* Falling sorry words */
  .falling-word {
    position: fixed;
    top: -80px;
    color: rgba(255,180,220,0.85);
    font-size: 1.1rem;
    font-style: italic;
    font-family: 'Georgia', serif;
    pointer-events: none;
    animation: fallDown linear infinite;
    text-shadow: 0 0 12px rgba(255,150,200,0.7);
    z-index: 1;
  }

  @keyframes fallDown {
    0%   { transform: translateY(0) rotate(var(--rot)) scale(1); opacity: 0; }
    8%   { opacity: 0.9; }
    85%  { opacity: 0.8; }
    100% { transform: translateY(110vh) rotate(calc(var(--rot) + 20deg)) scale(0.8); opacity: 0; }
  }

  /* Floating hearts */
  .heart {
    position: fixed;
    pointer-events: none;
    animation: floatHeart ease-in-out infinite;
    z-index: 1;
    font-size: 1.4rem;
    filter: drop-shadow(0 0 6px rgba(255,100,150,0.8));
  }

  @keyframes floatHeart {
    0%   { transform: translateY(0) scale(1); opacity: 0.6; }
    50%  { transform: translateY(-30px) scale(1.15); opacity: 1; }
    100% { transform: translateY(0) scale(1); opacity: 0.6; }
  }

  /* Sparkles */
  .sparkle {
    position: fixed;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: radial-gradient(circle, #fff 0%, #ffaad4 60%, transparent 100%);
    pointer-events: none;
    animation: sparkleAnim ease-in-out infinite;
    z-index: 1;
  }

  @keyframes sparkleAnim {
    0%   { transform: scale(0) rotate(0deg); opacity: 0; }
    50%  { transform: scale(1.4) rotate(180deg); opacity: 1; }
    100% { transform: scale(0) rotate(360deg); opacity: 0; }
  }

  /* Main card */
  .card {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 3rem 3.5rem;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,180,220,0.25);
    border-radius: 28px;
    /*backdrop-filter: blur(18px);*/
   /* box-shadow: 0 0 60px rgba(180,80,200,0.25), 0 0 120px rgba(80,120,255,0.12), inset 0 0 40px rgba(255,255,255,0.04);*/
    animation: cardAppear 1.4s ease forwards;
    max-width: 540px;
    width: 90vw;
  }

  @keyframes cardAppear {
    0%   { opacity: 0; transform: translateY(40px) scale(0.9); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* Pulsing ring */
  .ring {
    position: absolute;
    border-radius: 50%;
    border: 1.5px solid rgba(255,150,200,0.35);
    animation: pulse-ring ease-out infinite;
    pointer-events: none;
  }
  .ring:nth-child(1) { width: 160px; height: 160px; top: -35px; left: 50%; transform: translateX(-50%); animation-delay: 0s; animation-duration: 3s; }
  .ring:nth-child(2) { width: 220px; height: 220px; top: -65px; left: 50%; transform: translateX(-50%); animation-delay: 0.5s; animation-duration: 3s; }
  .ring:nth-child(3) { width: 290px; height: 290px; top: -100px; left: 50%; transform: translateX(-50%); animation-delay: 1s; animation-duration: 3s; }

  @keyframes pulse-ring {
    0%   { opacity: 0.6; transform: translateX(-50%) scale(0.85); }
    60%  { opacity: 0.3; }
    100% { opacity: 0; transform: translateX(-50%) scale(1.1); }
  }

  .big-heart {
    font-size: 4rem;
    display: block;
    animation: heartBeat 1.4s ease-in-out infinite;
    filter: drop-shadow(0 0 16px rgba(255,80,120,0.9));
    margin-bottom: 0.5rem;
  }

  @keyframes heartBeat {
    0%   { transform: scale(1); }
    14%  { transform: scale(1.2); }
    28%  { transform: scale(1); }
    42%  { transform: scale(1.15); }
    56%  { transform: scale(1); }
    100% { transform: scale(1); }
  }

  .name {
    font-size: 2.8rem;
    font-weight: bold;
    background: linear-gradient(135deg, #ff9de2, #ffb3de, #c77dff, #9d8af8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 3px;
    animation: shimmer 3s ease-in-out infinite;
    background-size: 200% 200%;
  }

  @keyframes shimmer {
    0%   { background-position: 0% 50%; }
    50%  { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  .sorry-main {
    font-size: 1.6rem;
    color: rgba(252, 252, 252, 0.95);
    margin: 1.4rem 0 0.8rem;
    animation: fadeSlideUp 1.8s ease forwards;
    opacity: 0;
    animation-delay: 0.6s;
    line-height: 1.7;
    font-style: italic;
    letter-spacing: 1px;
  }

  @keyframes fadeSlideUp {
    from { opacity: 0; transform: translateY(22px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .sorry-sub {
    font-size: 1.05rem;
    color: rgba(255, 255, 255, 0.75);
    line-height: 1.9;
    animation: fadeSlideUp 1.8s ease forwards;
    opacity: 0;
    animation-delay: 1.1s;
    margin-top: 0.4rem;
  }

  .divider {
    width: 70px; height: 2px;
    margin: 1.4rem auto;
    background: linear-gradient(90deg, transparent, #ff9de2, #c77dff, transparent);
    border-radius: 4px;
    animation: fadeSlideUp 1.8s ease forwards;
    opacity: 0;
    animation-delay: 0.9s;
  }

  .sorry-promise {
    font-size: 0.95rem;
    color: rgba(220,180,255,0.8);
    margin-top: 1.4rem;
    animation: fadeSlideUp 1.8s ease forwards;
    opacity: 0;
    animation-delay: 1.4s;
    font-style: italic;
    letter-spacing: 0.5px;
  }

  /* Bottom hearts row */
  .hearts-row {
    margin-top: 1.6rem;
    display: flex;
    justify-content: center;
    gap: 10px;
    animation: fadeSlideUp 1.8s ease forwards;
    opacity: 0;
    animation-delay: 1.7s;
  }

  .hearts-row span {
    font-size: 1.3rem;
    animation: heartBeat 1.4s ease-in-out infinite;
    filter: drop-shadow(0 0 8px rgba(255,80,120,0.8));
  }
  .hearts-row span:nth-child(2) { animation-delay: 0.2s; }
  .hearts-row span:nth-child(3) { animation-delay: 0.4s; }
  .hearts-row span:nth-child(4) { animation-delay: 0.6s; }
  .hearts-row span:nth-child(5) { animation-delay: 0.8s; }

  /* Waterfall "sorry" at bottom */
  .sorry-cascade {
    margin-top: 2rem;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 6px;
    animation: fadeSlideUp 1.8s ease forwards;
    opacity: 0;
    animation-delay: 2s;
  }

  .sorry-cascade span {
    color: rgba(255,180,220,0.55);
    font-size: 0.75rem;
    font-style: italic;
    letter-spacing: 1px;
    animation: twinkle 2.5s ease-in-out infinite;
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0.4; transform: scale(1); }
    50%       { opacity: 0.9; transform: scale(1.06); }
  }

  /* Orbit dots */
  .orbit {
    position: absolute;
    width: 360px; height: 360px;
    border-radius: 50%;
    border: 1px dashed rgba(180,120,255,0.2);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    animation: rotateOrbit 14s linear infinite;
    pointer-events: none;
  }

  @keyframes rotateOrbit {
    from { transform: translate(-50%, -50%) rotate(0deg); }
    to   { transform: translate(-50%, -50%) rotate(360deg); }
  }

  .orbit-dot {
    position: absolute;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: rgba(255,160,210,0.8);
    top: -4px; left: 50%;
    transform: translateX(-50%);
    box-shadow: 0 0 10px rgba(255,100,180,0.7);
  }
</style>
</head>
<body>


<audio id="myAudio">
  <source src="mm\ssong.mp3" type="audio/mpeg">
</audio>



<div id="particles"></div>

<div class="card">
  <div class="ring"></div>
  <div class="ring"></div>
  <div class="ring"></div>

  <div class="orbit">
    <div class="orbit-dot"></div>
  </div>

  <span class="big-heart">💗</span>
  <div class="name" onclick="playMusic()">Kannama</div>

  <div class="sorry-main">I am truly sorry...</div>

  <div class="divider"></div>

  <div class="sorry-sub">
    I am sorry for hurting you.<br>
    From the bottom of my heart,<br>
    I ask for your forgiveness. 🙏
  </div>

  <div class="sorry-promise">
    Please forgive me, Kannama.<br>
    You mean everything to me. 💜
  </div>

  <div class="hearts-row">
    <span>💗</span><span>💖</span><span>💝</span><span>💖</span><span>💗</span>
  </div>

  <div class="sorry-cascade" id="cascade"></div>
</div>

<script>
 alert("Plese click on ' Kannama '");
   function playMusic() {
    document.getElementById("myAudio").play();
  }

  const sorryWords = ["sorry", "sorry", "forgive me", "sorry", "please", "sorry", "క్షమించు", "sorry", "I'm sorry", ];
  const heartEmojis = ["💗","💖","💕","💓","💞","✨","🌸","💜","🤍"];

  const container = document.getElementById('particles');

  function rand(min, max) { return Math.random() * (max - min) + min; }

  // Falling sorry words
  for (let i = 0; i < 22; i++) {
    const el = document.createElement('div');
    el.className = 'falling-word';
    const word = sorryWords[Math.floor(Math.random() * sorryWords.length)];
    el.textContent = word;
    const left = rand(2, 96);
    const dur = rand(5, 13);
    const delay = rand(-12, 0);
    const rot = rand(-18, 18);
    el.style.cssText = `left:${left}vw; animation-duration:${dur}s; animation-delay:${delay}s; --rot:${rot}deg; font-size:${rand(0.75,1.3)}rem;`;
    container.appendChild(el);
  }

  // Floating hearts
  for (let i = 0; i < 14; i++) {
    const el = document.createElement('div');
    el.className = 'heart';
    el.textContent = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];
    el.style.cssText = `left:${rand(2,95)}vw; top:${rand(5,90)}vh; animation-duration:${rand(2.5,5.5)}s; animation-delay:${rand(0,4)}s; font-size:${rand(0.9,1.8)}rem;`;
    container.appendChild(el);
  }

  // Sparkles
  for (let i = 0; i < 30; i++) {
    const el = document.createElement('div');
    el.className = 'sparkle';
    el.style.cssText = `left:${rand(0,100)}vw; top:${rand(0,100)}vh; animation-duration:${rand(1.5,4)}s; animation-delay:${rand(0,4)}s; width:${rand(3,8)}px; height:${rand(3,8)}px;`;
    container.appendChild(el);
  }

  // Sorry cascade at bottom of card
  const cascade = document.getElementById('cascade');
  const phrases = ["sorry ✨","forgive me 💗","please 🌸","sorry 💜","I'm sorry 💕","maaf karo 💖","sorry ✨","please 🤍","forgive 💓","sorry 🌸"];
  phrases.forEach((p, i) => {
    const s = document.createElement('span');
    s.textContent = p;
    s.style.animationDelay = (i * 0.28) + 's';
    cascade.appendChild(s);
  });
</script>
</body>
</html>
